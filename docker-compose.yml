services:
  app:
    build: .
    ports:
      - "20236:20236"
    environment:
      - MONGO_CONNECT=mongodb://mongo:27017/MinhVietHardware
      - PORT=20236
      - SESSION_SECRET=@!T!3nsGTHCq-4Hu
      - GROQ_API_KEY=
      - NODE_ENV=production
    depends_on:
      - mongo
